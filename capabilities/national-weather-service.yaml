naftiko: 1.0.0-alpha2
info:
  label: weather.gov API
  description: 'weather.gov API. 65 operations. Lead operation: weather.gov API. Self-contained Naftiko capability covering
    one National Weather Service business surface.'
  tags:
  - National Weather Service
  - weather.gov API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NATIONAL_WEATHER_SERVICE_API_KEY: NATIONAL_WEATHER_SERVICE_API_KEY
capability:
  consumes:
  - type: http
    namespace: national-weather-service
    baseUri: https://api.weather.gov
    description: weather.gov API business capability. Self-contained, no shared references.
    resources:
    - name: alerts
      path: /alerts
      operations:
      - name: alertsquery
        method: GET
        description: Returns all alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: active
          in: query
          type: boolean
          description: List only active alerts (use /alerts/active endpoints instead)
    - name: alerts-active
      path: /alerts/active
      operations:
      - name: alertsactive
        method: GET
        description: Returns all currently active alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts-active-area-area
      path: /alerts/active/area/{area}
      operations:
      - name: alertsactivearea
        method: GET
        description: Returns active alerts for the given area (state or marine area)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts-active-count
      path: /alerts/active/count
      operations:
      - name: alertsactivecount
        method: GET
        description: Returns info on the number of active alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts-active-region-region
      path: /alerts/active/region/{region}
      operations:
      - name: alertsactiveregion
        method: GET
        description: Returns active alerts for the given marine region
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts-active-zone-zoneId
      path: /alerts/active/zone/{zoneId}
      operations:
      - name: alertsactivezone
        method: GET
        description: Returns active alerts for the given NWS public zone or county
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts-types
      path: /alerts/types
      operations:
      - name: alertstypes
        method: GET
        description: Returns a list of alert types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts-id
      path: /alerts/{id}
      operations:
      - name: alertssingle
        method: GET
        description: Returns a specific alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: aviation-cwsus-cwsuId
      path: /aviation/cwsus/{cwsuId}
      operations:
      - name: cwsu
        method: GET
        description: Returns metadata about a Center Weather Service Unit
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: aviation-cwsus-cwsuId-cwas
      path: /aviation/cwsus/{cwsuId}/cwas
      operations:
      - name: cwas
        method: GET
        description: Returns a list of Center Weather Advisories from a CWSU
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: aviation-cwsus-cwsuId-cwas-date-sequence
      path: /aviation/cwsus/{cwsuId}/cwas/{date}/{sequence}
      operations:
      - name: cwa
        method: GET
        description: Returns a list of Center Weather Advisories from a CWSU
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sequence
          in: path
          type: integer
          description: Sequence number
          required: true
    - name: aviation-sigmets
      path: /aviation/sigmets
      operations:
      - name: sigmetquery
        method: GET
        description: Returns a list of SIGMET/AIRMETs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: atsu
          in: query
          type: string
          description: ATSU identifier
        - name: sequence
          in: query
          type: string
          description: SIGMET sequence number
    - name: aviation-sigmets-atsu
      path: /aviation/sigmets/{atsu}
      operations:
      - name: sigmetsbyatsu
        method: GET
        description: Returns a list of SIGMET/AIRMETs for the specified ATSU
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: aviation-sigmets-atsu-date
      path: /aviation/sigmets/{atsu}/{date}
      operations:
      - name: sigmetsbyatsubydate
        method: GET
        description: Returns a list of SIGMET/AIRMETs for the specified ATSU for the specified date
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: aviation-sigmets-atsu-date-time
      path: /aviation/sigmets/{atsu}/{date}/{time}
      operations:
      - name: sigmet
        method: GET
        description: Returns a specific SIGMET/AIRMET
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: glossary
      path: /glossary
      operations:
      - name: glossary
        method: GET
        description: Returns glossary terms
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: gridpoints-wfo-x},{y
      path: /gridpoints/{wfo}/{x},{y}
      operations:
      - name: gridpoint
        method: GET
        description: Returns raw numerical forecast data for a 2.5km grid area
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: gridpoints-wfo-x},{y-forecast
      path: /gridpoints/{wfo}/{x},{y}/forecast
      operations:
      - name: gridpointforecast
        method: GET
        description: Returns a textual forecast for a 2.5km grid area
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: gridpoints-wfo-x},{y-forecast-hourly
      path: /gridpoints/{wfo}/{x},{y}/forecast/hourly
      operations:
      - name: gridpointforecasthourly
        method: GET
        description: Returns a textual hourly forecast for a 2.5km grid area
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: gridpoints-wfo-x},{y-stations
      path: /gridpoints/{wfo}/{x},{y}/stations
      operations:
      - name: gridpointstations
        method: GET
        description: Returns a list of observation stations usable for a given 2.5km grid area
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: icons
      path: /icons
      operations:
      - name: iconssummary
        method: GET
        description: Returns a list of icon codes and textual descriptions. Icon services in API are deprecated.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: icons-set-timeOfDay-first
      path: /icons/{set}/{timeOfDay}/{first}
      operations:
      - name: icons
        method: GET
        description: Returns a forecast icon. Icon services in API are deprecated.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: icons-set-timeOfDay-first-second
      path: /icons/{set}/{timeOfDay}/{first}/{second}
      operations:
      - name: iconsdualcondition
        method: GET
        description: Returns a forecast icon. Icon services in API are deprecated.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: offices-officeId
      path: /offices/{officeId}
      operations:
      - name: office
        method: GET
        description: Returns metadata about a NWS forecast office
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: offices-officeId-briefing
      path: /offices/{officeId}/briefing
      operations:
      - name: officebriefing
        method: GET
        description: Returns active briefing for an NWS office
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: offices-officeId-briefing-download-latest
      path: /offices/{officeId}/briefing/download/latest
      operations:
      - name: officebriefingdownloadlatest
        method: GET
        description: Returns the latest briefing for an office
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: offices-officeId-briefing-download-briefingId
      path: /offices/{officeId}/briefing/download/{briefingId}
      operations:
      - name: officebriefingdownload
        method: GET
        description: Returns a briefing for an office
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: offices-officeId-headlines
      path: /offices/{officeId}/headlines
      operations:
      - name: officeheadlines
        method: GET
        description: Returns a list of news headlines for a given NWS office
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: offices-officeId-headlines-headlineId
      path: /offices/{officeId}/headlines/{headlineId}
      operations:
      - name: officeheadline
        method: GET
        description: Returns a specific news headline for a given NWS office
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: offices-officeId-weatherstories
      path: /offices/{officeId}/weatherstories
      operations:
      - name: officeweatherstory
        method: GET
        description: Returns active weather stories for an NWS office
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: offices-officeId-weatherstories-download-imageId
      path: /offices/{officeId}/weatherstories/download/{imageId}
      operations:
      - name: officeweatherstoryimage
        method: GET
        description: Returns the image for a weather story
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: points-latitude},{longitude
      path: /points/{latitude},{longitude}
      operations:
      - name: point
        method: GET
        description: Returns metadata about a given latitude/longitude point
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: points-latitude},{longitude-radio
      path: /points/{latitude},{longitude}/radio
      operations:
      - name: pointradio
        method: GET
        description: Returns NOAA Weather Radio broadcast script for a latitude/longitude point
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: points-latitude},{longitude-stations
      path: /points/{latitude},{longitude}/stations
      operations:
      - name: pointstations
        method: GET
        description: Returns a list of observation stations for a given point
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products
      path: /products
      operations:
      - name: productsquery
        method: GET
        description: Returns a list of text products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: location
          in: query
          type: array
          description: Location id
        - name: start
          in: query
          type: string
          description: Start time
        - name: end
          in: query
          type: string
          description: End time
        - name: office
          in: query
          type: array
          description: Issuing office
        - name: wmoid
          in: query
          type: array
          description: WMO id code
        - name: type
          in: query
          type: array
          description: Product code
        - name: limit
          in: query
          type: integer
          description: Limit
    - name: products-locations
      path: /products/locations
      operations:
      - name: productlocations
        method: GET
        description: Returns a list of valid text product issuance locations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products-locations-locationId-types
      path: /products/locations/{locationId}/types
      operations:
      - name: locationproducts
        method: GET
        description: Returns a list of valid text product types for a given issuance location
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products-types
      path: /products/types
      operations:
      - name: producttypes
        method: GET
        description: Returns a list of valid text product types and codes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products-types-typeId
      path: /products/types/{typeId}
      operations:
      - name: productstype
        method: GET
        description: Returns a list of text products of a given type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products-types-typeId-locations
      path: /products/types/{typeId}/locations
      operations:
      - name: productstypelocations
        method: GET
        description: Returns a list of valid text product issuance locations for a given product type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products-types-typeId-locations-locationId
      path: /products/types/{typeId}/locations/{locationId}
      operations:
      - name: productstypelocation
        method: GET
        description: Returns a list of text products of a given type for a given issuance location
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products-types-typeId-locations-locationId-latest
      path: /products/types/{typeId}/locations/{locationId}/latest
      operations:
      - name: latestproducttypelocation
        method: GET
        description: Returns latest text products of a given type for a given issuance location with product text
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products-productId
      path: /products/{productId}
      operations:
      - name: product
        method: GET
        description: Returns a specific text product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: radar-profilers-stationId
      path: /radar/profilers/{stationId}
      operations:
      - name: radarprofiler
        method: GET
        description: Returns metadata about a given radar wind profiler
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: time
          in: query
          type: string
          description: Time interval
        - name: interval
          in: query
          type: string
          description: Averaging interval
    - name: radar-queues-host
      path: /radar/queues/{host}
      operations:
      - name: radarqueue
        method: GET
        description: Returns metadata about a given radar queue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Record limit
        - name: arrived
          in: query
          type: string
          description: Range for arrival time
        - name: created
          in: query
          type: string
          description: Range for creation time
        - name: published
          in: query
          type: string
          description: Range for publish time
        - name: station
          in: query
          type: string
          description: Station identifier
        - name: type
          in: query
          type: string
          description: Record type
        - name: feed
          in: query
          type: string
          description: Originating product feed
        - name: resolution
          in: query
          type: integer
          description: Resolution version
    - name: radar-servers
      path: /radar/servers
      operations:
      - name: radarservers
        method: GET
        description: Returns a list of radar servers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: reportingHost
          in: query
          type: string
          description: Show records from specific reporting host
    - name: radar-servers-id
      path: /radar/servers/{id}
      operations:
      - name: radarserver
        method: GET
        description: Returns metadata about a given radar server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: reportingHost
          in: query
          type: string
          description: Show records from specific reporting host
    - name: radar-stations
      path: /radar/stations
      operations:
      - name: radarstations
        method: GET
        description: Returns a list of radar stations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: stationType
          in: query
          type: array
          description: Limit results to a specific station type or types
        - name: reportingHost
          in: query
          type: string
          description: Show RDA and latency info from specific reporting host
        - name: host
          in: query
          type: string
          description: Show latency info from specific LDM host
    - name: radar-stations-stationId
      path: /radar/stations/{stationId}
      operations:
      - name: radarstation
        method: GET
        description: Returns metadata about a given radar station
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: reportingHost
          in: query
          type: string
          description: Show RDA and latency info from specific reporting host
        - name: host
          in: query
          type: string
          description: Show latency info from specific LDM host
    - name: radar-stations-stationId-alarms
      path: /radar/stations/{stationId}/alarms
      operations:
      - name: radarstationalarms
        method: GET
        description: Returns metadata about a given radar station alarms
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: radio-callSign-broadcast
      path: /radio/{callSign}/broadcast
      operations:
      - name: arearadio
        method: GET
        description: Returns NOAA Weather Radio broadcast script for a transmitter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: stations
      path: /stations
      operations:
      - name: obsstations
        method: GET
        description: Returns a list of observation stations.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: array
          description: Filter by observation station ID
        - name: state
          in: query
          type: array
          description: Filter by state/marine area code
    - name: stations-stationId
      path: /stations/{stationId}
      operations:
      - name: obsstation
        method: GET
        description: Returns metadata about a given observation station
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: stations-stationId-observations
      path: /stations/{stationId}/observations
      operations:
      - name: stationobservationlist
        method: GET
        description: Returns a list of observations for a given station
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Limit
    - name: stations-stationId-observations-latest
      path: /stations/{stationId}/observations/latest
      operations:
      - name: stationobservationlatest
        method: GET
        description: Returns the latest observation for a station
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: require_qc
          in: query
          type: boolean
          description: Require QC
    - name: stations-stationId-observations-time
      path: /stations/{stationId}/observations/{time}
      operations:
      - name: stationobservationtime
        method: GET
        description: Returns a single observation.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: time
          in: path
          type: string
          description: Timestamp of requested observation
          required: true
    - name: stations-stationId-tafs
      path: /stations/{stationId}/tafs
      operations:
      - name: tafs
        method: GET
        description: Returns Terminal Aerodrome Forecasts for the specified airport station.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: stations-stationId-tafs-date-time
      path: /stations/{stationId}/tafs/{date}/{time}
      operations:
      - name: taf
        method: GET
        description: Returns a single Terminal Aerodrome Forecast.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: thumbnails-satellite-area
      path: /thumbnails/satellite/{area}
      operations:
      - name: satellitethumbnails
        method: GET
        description: Returns a thumbnail image for a satellite region. Image services in API are deprecated.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: zones
      path: /zones
      operations:
      - name: zonelist
        method: GET
        description: Returns a list of zones
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: array
          description: Zone ID (forecast or county)
        - name: area
          in: query
          type: array
          description: State/marine area code
        - name: region
          in: query
          type: array
          description: Region code
        - name: type
          in: query
          type: array
          description: Zone type
        - name: point
          in: query
          type: string
          description: Point (latitude,longitude)
        - name: include_geometry
          in: query
          type: boolean
          description: Include geometry in results (true/false)
        - name: limit
          in: query
          type: integer
          description: Limit
        - name: effective
          in: query
          type: string
          description: Effective date/time
    - name: zones-forecast-zoneId-observations
      path: /zones/forecast/{zoneId}/observations
      operations:
      - name: zoneobs
        method: GET
        description: Returns a list of observations for a given zone
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start
          in: query
          type: string
          description: Start date/time
        - name: end
          in: query
          type: string
          description: End date/time
        - name: limit
          in: query
          type: integer
          description: Limit
    - name: zones-forecast-zoneId-stations
      path: /zones/forecast/{zoneId}/stations
      operations:
      - name: zonestations
        method: GET
        description: Returns a list of observation stations for a given zone
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: zones-type
      path: /zones/{type}
      operations:
      - name: zonelisttype
        method: GET
        description: Returns a list of zones of a given type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: array
          description: Zone ID (forecast or county)
        - name: area
          in: query
          type: array
          description: State/marine area code
        - name: region
          in: query
          type: array
          description: Region code
        - name: type
          in: query
          type: array
          description: Zone type
        - name: point
          in: query
          type: string
          description: Point (latitude,longitude)
        - name: include_geometry
          in: query
          type: boolean
          description: Include geometry in results (true/false)
        - name: limit
          in: query
          type: integer
          description: Limit
        - name: effective
          in: query
          type: string
          description: Effective date/time
    - name: zones-type-zoneId
      path: /zones/{type}/{zoneId}
      operations:
      - name: zone
        method: GET
        description: Returns metadata about a given zone
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: effective
          in: query
          type: string
          description: Effective date/time
    - name: zones-type-zoneId-forecast
      path: /zones/{type}/{zoneId}/forecast
      operations:
      - name: zoneforecast
        method: GET
        description: Returns the current zone forecast for a given zone
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: User-Agent
      value: '{{env.NATIONAL_WEATHER_SERVICE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: national-weather-service-rest
