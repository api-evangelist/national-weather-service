aid: national-weather-service
name: National Weather Service
description: >-
  The National Weather Service (NWS) is a government agency within the National Oceanic and Atmospheric Administration
  (NOAA) that is responsible for providing weather forecasts, warnings, and other meteorological information to the
  public, government agencies, and private industries.
